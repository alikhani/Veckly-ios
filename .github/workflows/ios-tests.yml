name: iOS Tests

on:
  push:
    branches: [develop, master, staging-plan]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ios-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # The runner's default `xcode-select` (16.4) doesn't pair with any installed
      # iOS Simulator runtime on this image — only visionOS shows up as a valid
      # destination under it. The 26.x Xcode family (matching our local toolchain)
      # pairs correctly with the iOS 26.x simulator runtimes that are installed.
      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache resolved Swift packages
        uses: actions/cache@v4
        with:
          path: DerivedData/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('Veckly.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # SANITY CHECK — temporary. iOS Simulator never appears as a destination for
      # this scheme on this runner no matter what we try (named device, generic
      # placeholder, explicit Xcode version, explicit UDID boot — all give the
      # identical "only visionOS Simulator is available" result). Targeting
      # visionOS directly tells us whether xcodebuild/testing works on this runner
      # at all, isolating whether the problem is iOS-Simulator-specific.
      - name: Run VecklyTests (visionOS sanity check)
        run: |
          xcodebuild test \
            -project Veckly.xcodeproj \
            -scheme Veckly \
            -destination "platform=visionOS Simulator,name=Apple Vision Pro" \
            -derivedDataPath DerivedData \
            -only-testing:VecklyTests \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 14
