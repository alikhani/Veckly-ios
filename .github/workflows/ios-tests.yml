name: iOS Tests

on:
  push:
    branches: [develop, master, staging-plan]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ios-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache resolved Swift packages
        uses: actions/cache@v4
        with:
          path: DerivedData/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('Veckly.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Run VecklyTests
        run: |
          xcodebuild test \
            -project Veckly.xcodeproj \
            -scheme Veckly \
            -destination "platform=iOS Simulator,name=Any iOS Simulator Device" \
            -derivedDataPath DerivedData \
            -only-testing:VecklyTests \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 14
