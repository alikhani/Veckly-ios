name: iOS Tests

on:
  push:
    branches: [develop, master, staging-plan]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ios-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # The runner's default `xcode-select` (16.4) doesn't pair with any installed
      # iOS Simulator runtime on this image — only visionOS shows up as a valid
      # destination under it. The 26.x Xcode family (matching our local toolchain)
      # pairs correctly with the iOS 26.x simulator runtimes that are installed.
      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Diagnose available simulator runtimes
        run: |
          echo "--- Installed simulator runtimes (simctl) ---"
          xcrun simctl list runtimes
          echo "--- Eligible destinations for the Veckly scheme ---"
          xcodebuild -showdestinations -project Veckly.xcodeproj -scheme Veckly || true

      - name: Cache resolved Swift packages
        uses: actions/cache@v4
        with:
          path: DerivedData/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('Veckly.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Run VecklyTests
        run: |
          xcodebuild test \
            -project Veckly.xcodeproj \
            -scheme Veckly \
            -destination "platform=iOS Simulator,name=Any iOS Simulator Device" \
            -derivedDataPath DerivedData \
            -only-testing:VecklyTests \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 14
