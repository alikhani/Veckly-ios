name: iOS Tests

on:
  push:
    branches: [develop, master, staging-plan]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ios-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # The runner's default `xcode-select` (16.4) doesn't pair with any installed
      # iOS Simulator runtime on this image — only visionOS shows up as a valid
      # destination under it. The 26.x Xcode family (matching our local toolchain)
      # pairs correctly with the iOS 26.x simulator runtimes that are installed.
      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache resolved Swift packages
        uses: actions/cache@v4
        with:
          path: DerivedData/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('Veckly.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # `xcodebuild -showdestinations` doesn't reliably surface freshly-provisioned
      # iOS Simulator devices on a clean runner image, even though `simctl` already
      # sees them — booting one explicitly by UDID first and targeting it directly
      # sidesteps that name-matching layer entirely.
      - name: Boot an iOS simulator
        id: simulator
        run: |
          set -euo pipefail
          RUNTIME_ID=$(xcrun simctl list runtimes available -j | jq -r '[.runtimes[] | select(.name | startswith("iOS"))] | sort_by(.version) | last.identifier')
          echo "Using runtime: $RUNTIME_ID"
          DEVICE_UDID=$(xcrun simctl list devices available -j | jq -r --arg rt "$RUNTIME_ID" '.devices[$rt][] | select(.name | test("^iPhone")) | .udid' | head -1)
          if [ -z "$DEVICE_UDID" ]; then
            echo "No iPhone device found for runtime $RUNTIME_ID" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "Booting device: $DEVICE_UDID"
          xcrun simctl boot "$DEVICE_UDID"
          xcrun simctl bootstatus "$DEVICE_UDID" -b
          echo "udid=$DEVICE_UDID" >> "$GITHUB_OUTPUT"

      - name: Run VecklyTests
        run: |
          xcodebuild test \
            -project Veckly.xcodeproj \
            -scheme Veckly \
            -destination "id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath DerivedData \
            -only-testing:VecklyTests \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 14
